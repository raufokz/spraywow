name: Deploy To Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_mysql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HPANEL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.HPANEL_SSH_PORT }}" -H "${{ secrets.HPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to app directory
        run: |
          rsync -avzr --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage/app/public" \
            --exclude "storage/framework/cache/*" \
            --exclude "storage/framework/sessions/*" \
            --exclude "storage/framework/views/*" \
            --exclude "storage/logs/*" \
            -e "ssh -p ${{ secrets.HPANEL_SSH_PORT }}" \
            ./ "${{ secrets.HPANEL_SSH_USER }}@${{ secrets.HPANEL_SSH_HOST }}:${{ secrets.HPANEL_APP_PATH }}/"

      - name: Publish public files
        run: |
          rsync -avzr --delete \
            -e "ssh -p ${{ secrets.HPANEL_SSH_PORT }}" \
            public/ "${{ secrets.HPANEL_SSH_USER }}@${{ secrets.HPANEL_SSH_HOST }}:${{ secrets.HPANEL_PUBLIC_PATH }}/"

      - name: Run production commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HPANEL_SSH_HOST }}
          username: ${{ secrets.HPANEL_SSH_USER }}
          key: ${{ secrets.HPANEL_SSH_KEY }}
          port: ${{ secrets.HPANEL_SSH_PORT }}
          script: |
            cat > "${{ secrets.HPANEL_PUBLIC_PATH }}/index.php" <<'PHP'
            <?php

            use Illuminate\Foundation\Application;
            use Illuminate\Http\Request;

            define('LARAVEL_START', microtime(true));

            if (file_exists($maintenance = '${{ secrets.HPANEL_APP_PATH }}/storage/framework/maintenance.php')) {
                require $maintenance;
            }

            require '${{ secrets.HPANEL_APP_PATH }}/vendor2/autoload.php';

            /** @var Application $app */
            $app = require_once '${{ secrets.HPANEL_APP_PATH }}/bootstrap/app.php';

            $app->handleRequest(Request::capture());
            PHP

            cd ${{ secrets.HPANEL_APP_PATH }}
            chmod -R 775 storage bootstrap/cache
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan migrate --force
            php artisan storage:link || true
            php artisan view:cache
            php artisan route:cache
